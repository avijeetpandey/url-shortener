server:
  port: 9000

spring:
  application:
    name: url-shortener
  datasource:
    url: jdbc:postgresql://localhost:5432/tinyurl
    username: postgres
    password: postgres
    hikari:
      pool-name: HikariCP-UrlShortener
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always